<!DOCTYPE html>
<html lang="tr">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --gold: #D4AF37; --black: #050505; }
        body { margin: 0; background: var(--black); color: white; font-family: 'Playfair Display', serif; overflow-x: hidden; }

        /* Lüks Giriş Ekranı */
        #gatekeeper {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: 1s;
        }
        .royal-seal {
            width: 100px; height: 100px; border: 2px solid var(--gold);
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; font-weight: bold; font-size: 2rem;
            box-shadow: 0 0 20px var(--gold); cursor: pointer;
            animation: pulse 2s infinite;
        }

        /* Ana İçerik */
        #empire-content { display: none; padding: 20px; text-align: center; }
        .car-card { border: 1px solid #222; margin-bottom: 20px; border-radius: 10px; overflow: hidden; }
        .stock-bar { position: fixed; bottom: 0; background: var(--gold); color: black; width: 100%; padding: 5px; font-weight: bold; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div id="gatekeeper" onclick="enterEmpire()">
    <div class="royal-seal">ED</div>
    <p style="margin-top:20px; color:var(--gold);">Giriş Yapmak İçin Dokunun</p>
</div>

<div id="empire-content">
    <h1 style="color:var(--gold);">ENES DEVA IMPERIUM</h1>
    
    <div class="car-card">
        <img src="https://via.placeholder.com/400x200?text=Mercedes+AMG" style="width:100%;">
        <h3>Mercedes-Benz AMG G63</h3>
        <a href="https://wa.me/905518329861" style="color:var(--gold);">Talep Et</a>
    </div>

    <div class="stock-bar">
        USD: 31.45 ↑ | GOLD: 2450.10 ↓ | BTC: 64,200$ ↑
    </div>
</div>

<script>
    function enterEmpire() {
        document.getElementById('gatekeeper').style.display = 'none';
        document.getElementById('empire-content').style.display = 'block';
    }
</script>

</body>
</html>
